<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" name="viewport" content="width=device-width,initial-scale=1">
        <title>🐷 Shop</title>

        <!-- CSS 연결 -->
        <link rel="stylesheet" href="order.css">
        
        <!-- jQuery CDN -->
        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

        <meta name="color-scheme" content="light only"/>
	    <meta name="supported-color-schemes" content="light"/>

    </head>
    <body>
        <div class="container">
            <div class="header">
                <img class="title_img" src="img/pig.png" alt="제목">
                <p class="title_txt">1000일 기념 굿즈 판매</p>
                <img class="title_img" src="img/pig2.png" alt="제목">
            </div>

            <div style="display: flex; flex-direction: column; justify-content: center; align-items: center; margin-bottom: 60px; margin-top: 60px;">
                <span style="font-weight: bold; font-size: 25px; margin-bottom: 15px;">주문이 완료되었습니다!</span>
                <div style="display: flex; justify-content: center; flex-direction: column; text-align: left; ">
                    <span style="margin-bottom: 5px; font-size: 13px;">※ <b>아래 계좌</b>로 입금을 해주셔야 최종 주문이 완료됩니다.</span>
                    <span style="margin-bottom: 5px; font-size: 13px;">※ <b>주문자 성함</b>과 <b>입금자 성함</b>이 동일해야 입금 확인이 가능합니다.</span>
                    <span style="font-size: 13px;">※ <b>04/13 18시</b>까지 입금 확인이 안될 경우 구매가 <b>자동 취소</b>됩니다.</span>
                </div>
            </div>

            <div style="display: flex; flex-direction: column;">
                <span style="font-size: 27px;">농협은행</span>
                <span style="font-size: 15px;">예금주 : 최지은</span>
            </div>

            <div style="margin-top: 25px;">
                <span id="price_txt" style="font-size: 27px; color: #ff5160; font-weight: bold;"></span>
            </div>

            <div style="display: flex; justify-content: center; align-items: center; margin-top: 30px;">
                <div class="copy_box">
                    <span class="copy_text">312 0016 7124 21</span>
                    <button class="copy_btn">복사하기</button>
                </div>
            </div>

            <div style="margin-top: 55px; padding-bottom: 100px;">
                <span>구매해 주셔서 감사합니다!</span><br>
                <span>정성 가득 담아 보내드릴게요♡</span>
            </div>

        </div>

        <script>
            $(document).ready(function () {
                var cart = JSON.parse(localStorage.getItem('cartList'));
                var totalPrice = 0;
                
                cart.forEach(function(item) {
                    var price = parseInt(item.itemTotal, 10);
                    totalPrice += price;
                });
                
                $("#price_txt").text(totalPrice.toLocaleString()+"원");

                $('.copy_btn').click(function () {

                    const text = $('.copy_text').text();

                    const temp = $('<input>');
                    $('body').append(temp);
                    temp.val(text).select();
                    document.execCommand('copy');
                    temp.remove();

                });
            });
        </script>
    </body>
</html>
