<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" name="viewport" content="width=device-width,initial-scale=1">
    <title>🐷 Shop</title>

    <!-- CSS 연결 -->
    <link rel="stylesheet" href="style.css">

    <!-- head에 추가 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- ✅ jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>
    <div class="container">
        <div class="header">
            <img class="title_img" src="img/pig.png" alt="제목">
            <p class="title_txt">1000일 기념 굿즈 판매</p>
            <img class="title_img" src="img/pig2.png" alt="제목">
        </div>

        <div style="margin-bottom: 10px;">
            <img class="main_img" src="img/main.png" alt="굿즈상품">
        </div>
        <div class="product_title">
            <p style="width: fit-content; margin: 5px; font-size: 25px;">키링, 그립톡, 티셔츠 (3종)</p>
            <div class="info_box">
                <div style="display: flex;">
                    <p class="sale_info">판매 기간</p>
                    <p class="info_text">2026-04-06 ~ 2026-04-13</p>
                </div>
                <div style="display: flex;">
                    <p class="sale_info">결제 방식</p>
                    <p class="info_text">무통장 입금</p>
                </div>
            </div>
        </div>

        <div class="menu_div">
            <ul class="menu_list">
                <li data-type="product" class="active">상품정보</li>
                <li data-type="ask">문의정보</li>
            </ul>

        </div>
        <div class="info_menu" id="product_menu">
            <img class="product_main" src="/img/일코티.png" alt="굿즈상품">

            <h1>키링</h1>
            <h1>그립톡</h1>
            <h1>덕코티</h1>
            <h1>일코티</h1>
        </div>

        <div class="info_menu" id="ask_menu" style="display: none;">
            <br>
            <!-- <h3>주문 확인이나 변경, 취소를 원하실 경우 <br> 아래 경로로 편하게 문의해 주세요. <br> 신속하게 처리해 드리겠습니다.</h3> -->
            <!-- <h4>Q1. 주문한 내역을 확인하고 싶어요.</h4>
            <h4>Q2. 주문 정보를 수정하고 싶어요.</h4> -->
            <h3>📢 상품, 배송, 결제 관련 문의는 아래 경로로 문의 부탁드립니다.</h3>
            <br>
            <div style="margin-left: 10px;">
                <div style="display: flex;">
                    <p><i class="fa-solid fa-comment"></i> 카카오톡 : 
                        <a class="ask_url" href="https://open.kakao.com/o/sgdD1Bci" target="_blank">배꼽냄새 오픈채팅</a>
                    </p>
                </div>
                <div style="display: flex;">
                    <p><i class="fa-brands fa-instagram"></i> 인스타그램 : 
                        <a class="ask_url" href="https://www.instagram.com/baekkobnaemsae?igsh=MTJyb20wc3hpbmVldQ==" target="_blank">@baekkobnaemsae</a>&nbsp;/
                        <a class="ask_url" href="https://www.instagram.com/zoxsaui?igsh=MXhjNHF6Z2R4a2swaw==" target="_blank">@zoxsaui</a>
                    </p>
                </div>
            </div>
        </div>

        <div class="cart_button">
            <button id="cart_info">구매하기</button>
        </div>
    </div>

    <div class="overlay"></div>

    <div class="bottom_sheet">
        <div class="sheet_header">
            <span>상품 선택</span>
            <button class="close_btn"></button>
        </div>

        <div class="sheet_content">
            <div class="product_option_area">

                <!-- 키링 -->
                <div class="product_item">
                    <div class="product_info">
                        <div class="info_txt">
                            <h3 class="product_txt">키링</h3>
                            <span class="price_txt">6,000원</span>
                        </div>
                        <div class="quantity_box">
                            <button class="minus">-</button>
                            <span class="qty">1</span>
                            <button class="plus">+</button>
                        </div>
                    </div>
                    <div class="item_bottom">
                        <div class="option_choose"></div>
                        <button class="add_cart">담기</button>
                    </div>
                </div>

                <!-- 그립톡 -->
                <div class="product_item">
                    <div class="product_info">
                        <div class="info_txt">
                            <h3 class="product_txt">그립톡</h3>
                            <span class="price_txt">3,500원</span>
                        </div>
                        <div class="quantity_box">
                            <button class="minus">-</button>
                            <span class="qty">1</span>
                            <button class="plus">+</button>
                        </div>
                    </div>

                    <div class="item_bottom">
                        <div class="option_choose">
                            <select class="option">
                                <option value="">- 옵션 선택 -</option>
                                <option value="부착형">부착형 + 2,000원</option>
                                <option value="맥세이프">맥세이프 + 5,000원</option>
                            </select>
                        </div>
                        <button class="add_cart">담기</button>
                    </div>
                </div>

                <!-- 티셔츠 -->
                <div class="product_item">
                    <div class="product_info">
                        <div class="info_txt">
                            <h3 class="product_txt">티셔츠</h3>
                            <span class="price_txt">32,000원</span>
                        </div>
                        <div class="quantity_box">
                            <button class="minus">-</button>
                            <span class="qty">1</span>
                            <button class="plus">+</button>
                        </div>
                    </div>

                    <div class="item_bottom">
                        <div class="option_choose">
                            <select class="option type">
                                <option value="">- 옵션 선택 -</option>
                                <option value="일코티">일코티</option>
                                <option value="1000일티">1000일이나 버텼티 + 5,000원</option>
                            </select>

                            <select class="option size">
                                <option value="">- 사이즈 선택 -</option>
                                <option>M</option>
                                <option>L</option>
                                <option>XL</option>
                                <option>2XL</option>
                                <option>3XL</option>
                            </select>
                        </div>
                        <button class="add_cart">담기</button>
                    </div>
                </div>

            </div>

            <hr>

            <!-- 장바구니 영역 -->
            <div class="cart_list">
                <h3>장바구니</h3>
                <ul id="cart_items"></ul>

                <div class="total_price">
                    총 금액: <span id="total_price">0</span>원
                </div>
            </div>
        </div>

        <div class="product_buy">
            <button id="buy_button">이거 어디감</button>
        </div>
    </div>

    <script>
        $(document).ready(function () {

            $('.menu_list li').click(function () {
                const type = $(this).data('type');

                // 탭 active 처리
                $('.menu_list li').removeClass('active');
                $(this).addClass('active');

                $('#product_menu, #ask_menu').hide();
                $('#' + type + '_menu').show();
            });

            // 구매하기 버튼 클릭
            $('#cart_info').click(function () {
                $('.overlay').fadeIn(200);
                $('.bottom_sheet').addClass('active');
            });

            // 닫기 버튼 클릭
            $('.close_btn, .overlay').click(function () {
                $('.overlay').fadeOut(200);
                $('.bottom_sheet').removeClass('active');
            });

            // 수량 버튼
            $('.plus').click(function () {
                let qty = $(this).siblings('.qty');
                qty.text(parseInt(qty.text()) + 1);
            });

            $('.minus').click(function () {
                let qty = $(this).siblings('.qty');
                let current = parseInt(qty.text());
                if (current > 1) qty.text(current - 1);
            });

            // 총 금액 계산
            function updateTotal() {
                let total = 0;

                $('#cart_items li').each(function () {
                    const price = parseInt($(this).data('price'));
                    const qty = parseInt($(this).data('qty'));
                    total += price * qty;
                });

                $('#total_price').text(total.toLocaleString());
            }

            // 장바구니 담기
            $('.add_cart').click(function () {

                const parent = $(this).closest('.product_item');
                const name = parent.find('h3').text();
                let qty = parseInt(parent.find('.qty').text());

                let optionText = '';
                let price = parseInt(parent.find('.price').text());

                // 키링
                if (name === '키링') {
                    optionText = '옵션 없음';
                    price = 6000;
                }

                // 그립톡
                if (name === '그립톡') {
                    const opt = parent.find('.option').val();
                    if (!opt) {
                        alert('옵션 선택하세요');
                        return;
                    }

                    optionText = opt;
                    price = (opt === '부착형') ? 5500 : 8500;
                }

                // 티셔츠
                if (name === '티셔츠') {
                    const type = parent.find('.type').val();
                    const size = parent.find('.size').val();

                    if (!type || !size) {
                        alert('옵션 선택하세요');
                        return;
                    }

                    optionText = type + ' / ' + size;
                    price = (type === '1000일티') ? 37000 : 32000;
                }

                const key = name + '_' + optionText;

                let found = false;

                // 같은 상품 있으면 수량 합치기
                $('#cart_items li').each(function () {
                    if ($(this).data('key') === key) {
                        let currentQty = parseInt($(this).data('qty'));
                        let newQty = currentQty + qty;

                        let currentPrice = parseInt($(this).data('price'));
                        let newPrice = price * newQty;

                        $(this).data('qty', newQty);
                        $(this).find('.qty_text').text(newQty);
                        $(this).find('.price_text').text(`(${newPrice.toLocaleString()}원)`);

                        found = true;
                    }
                });

                // 없으면 새로 추가
                if (!found) {
                    $('#cart_items').append(`
                      <li data-key="${key}" data-price="${price}" data-qty="${qty}">
                          <span>
                              ${name} / ${optionText} / 
                              <span class="qty_text">${qty}</span>개
                              <span class="price_text">(${(price * qty).toLocaleString()}원)</span>
                          </span>
                          <button class="delete_btn">삭제</button>
                      </li>
                  `);
                }

                updateTotal();

                const sheet = $('.sheet_content');
                const cartTop = $('.cart_list').position().top;

                sheet.animate({
                    scrollTop: cartTop
                }, 300);
            });

            // 삭제 버튼
            $(document).on('click', '.delete_btn', function () {
                $(this).closest('li').remove();
                updateTotal();
            });
        });
    </script>

</body>

</html>
